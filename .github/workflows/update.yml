# ================================================================
#  cvedcVPN — парсинг + DNS/WS-проверка конфигов
#
#  Триггеры:
#    • По расписанию — каждый час
#    • Вручную      — через вкладку Actions → Run workflow
#    • При пуше     — только если изменился parser.js или checker.js
#
#  Переменные репозитория (Settings → Variables → Actions):
#    MAX_LIMIT      — макс. число конфигов для парсера  (default: 500)
#    CONCURRENCY    — параллельных TCP-проверок          (default: 20)
#    TCP_TIMEOUT_MS — таймаут TCP в мс                  (default: 4000)
# ================================================================

name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'   # каждый час в 00 минут

  workflow_dispatch:        # запуск вручную из вкладки Actions
    inputs:
      max_limit:
        description: 'Максимальное число конфигов (пусто = значение по умолчанию)'
        required: false
        default: ''

  push:
    paths:
      - 'parser.js'
      - 'checker.js'

permissions:
  contents: write

jobs:
  parse-and-check:
    name: Parse → Check → Commit
    runs-on: ubuntu-latest
    timeout-minutes: 30    # checker может идти дольше парсера

    steps:
      # ── 1. Получить код репозитория ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Установить Node.js ────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Создать папку configs (если ещё нет в репо) ──────────
      - name: Ensure configs directory exists
        run: mkdir -p configs

      # ── 4. Запустить парсер → configs/configs.txt ────────────────
      - name: Run parser
        env:
          MAX_LIMIT: ${{ github.event.inputs.max_limit || vars.MAX_LIMIT || '500' }}
          OUTPUT_DIR: ./configs
        run: node parser.js

      # ── 5. Запустить чекер → configs/selected.txt ────────────────
      #  DNS-резолвинг + TCP-доступность для WS-конфигов
      - name: Run checker (DNS + WS)
        env:
          OUTPUT_DIR:      ./configs
          CONCURRENCY:     ${{ vars.CONCURRENCY    || '20'   }}
          TCP_TIMEOUT_MS:  ${{ vars.TCP_TIMEOUT_MS || '4000' }}
          DNS_TIMEOUT_MS:  '5000'
        run: node checker.js

      # ── 6. Проверить наличие изменений ───────────────────────────
      - name: Check for changes
        id: diff
        run: |
          git add configs/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 7. Закоммитить и запушить ────────────────────────────────
      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TOTAL=$(grep -cE '^(vless|vmess|trojan|ss)://' configs/configs.txt    || echo 0)
          ALIVE=$(grep -cE '^(vless|vmess|trojan|ss)://' configs/selected.txt   || echo 0)
          VERSION=$(cat configs/version.txt 2>/dev/null || echo 1)

          git commit -m "🔄 v${VERSION} | all: ${TOTAL} | ✅ ws-alive: ${ALIVE} [skip ci]"
          git push

      # ── 8. Нет изменений ─────────────────────────────────────────
      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "ℹ️ Конфиги не изменились, коммит пропущен."
