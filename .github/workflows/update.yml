# ================================================================
#  cvedcVPN — автообновление конфигов
#
#  Триггеры:
#    • По расписанию — каждый час
#    • Вручную      — через вкладку Actions → Run workflow
#    • При пуше     — только если изменился parser.js
#
#  Переменные окружения (Settings → Secrets and variables → Actions):
#    MAX_LIMIT   — максимальное число конфигов (необязательно, default: 500)
# ================================================================

name: Update VPN Configs

on:
  schedule:
    - cron: '0 * * * *'   # каждый час в 00 минут

  workflow_dispatch:        # запуск вручную из вкладки Actions
    inputs:
      max_limit:
        description: 'Максимальное число конфигов (пусто = значение по умолчанию)'
        required: false
        default: ''

  push:
    paths:
      - 'parser.js'         # пересобрать при изменении парсера

permissions:
  contents: write           # нужно для git push

jobs:
  parse:
    name: Parse & Commit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Получить код репозитория ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # полная история нужна для корректного git log

      # ── 2. Установить Node.js ────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # fetch встроен начиная с Node 18

      # ── 3. Создать папку configs (если ещё нет в репо) ──────────
      - name: Ensure configs directory exists
        run: mkdir -p configs

      # ── 4. Запустить парсер ──────────────────────────────────────
      - name: Run parser
        env:
          # Приоритет: ручной ввод → переменная репо → дефолт 500
          MAX_LIMIT: ${{ github.event.inputs.max_limit || vars.MAX_LIMIT || '500' }}
          OUTPUT_DIR: ./configs
        run: node parser.js

      # ── 5. Проверить наличие изменений ───────────────────────────
      #  git diff видит только уже отслеживаемые файлы.
      #  Решение: сначала git add, потом git diff --cached.
      #  Это корректно работает и для новых (untracked) файлов.
      - name: Check for changes
        id: diff
        run: |
          git add configs/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 6. Закоммитить и запушить (только если файл изменился) ───
      - name: Commit & push configs
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TOTAL=$(grep -cE '^(vless|vmess|trojan|ss)://' configs/configs.txt || echo 0)
          VERSION=$(cat configs/version.txt 2>/dev/null || echo 1)
          git commit -m "🔄 update configs — v${VERSION} (${TOTAL} configs) [skip ci]"
          git push

      # ── 7. Сообщить, если изменений не было ─────────────────────
      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "ℹ️ Конфиги не изменились, коммит пропущен."
