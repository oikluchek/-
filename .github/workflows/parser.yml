name: Parser

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: node index.js

      - name: commit
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add configs.txt
          git commit -m "update" || echo "no changes"
          git push
